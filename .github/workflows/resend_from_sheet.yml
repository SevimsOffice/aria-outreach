name: ARIA Resend from Sheet

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Kaç contact gönderilsin (warmup sırasında max 10 önerilir)'
        required: false
        default: '10'
      dry_run:
        description: 'Dry run (gönderme, sadece göster)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resend:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ARIA Resend
        env:
          ANTHROPIC_API_KEY:            ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON:  ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID:              ${{ secrets.GOOGLE_SHEET_ID }}
          INSTANTLY_API_KEY:            ${{ secrets.INSTANTLY_API_KEY }}
          INSTANTLY_CAMPAIGN_ID:        ${{ secrets.INSTANTLY_CAMPAIGN_ID }}
          TELEGRAM_BOT_TOKEN:           ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:             ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          LIMIT="${{ github.event.inputs.limit || '10' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          if [ "$DRY_RUN" = "true" ]; then
            python scripts/run_resend_from_sheet.py --dry-run --limit $LIMIT
          else
            python scripts/run_resend_from_sheet.py --limit $LIMIT
          fi
